controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    fishbot_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fishbot_diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

fishbot_diff_drive_controller:
  ros__parameters:
    use_sim_time: true

    # 1. 还原物理逻辑：左就是左，右就是右
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # 2. 检查你的 URDF，如果 base 半径是 0.1，轮距应该是 0.2
    wheel_separation: 0.20
    wheel_radius: 0.032

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_odom_tf: true

    # 3. 必须设为 false！我们要 Gazebo 的真实反馈，否则建图必偏
    open_loop: false

    # 4. 增大协方差，让 SLAM 容忍微小的卡顿漂移
    pose_covariance_diagonal:  [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 1.0e-3, 1.0e-3, 1.0e-3, 0.03]

    cmd_vel_timeout: 0.5
    use_stamped_vel: false